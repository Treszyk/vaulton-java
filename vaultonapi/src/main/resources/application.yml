spring:
  application:
    name: vaulton-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/vaulton_db
    username: ${DB_USER:postgres}
    password: ${SQL_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # change this later!
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        globally_quoted_identifiers: true

server:
  port: 8080
